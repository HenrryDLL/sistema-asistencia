<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exportar Reporte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="body-dashboard">

    <nav class="navbar-top">
        <div class="navbar-logo">
            <img src="/static/img/logo.png" alt="Logo">
            <span>LIAR FIRE SYSTEM</span>
        </div>
        <div class="menu-nav">
             <a href="/dashboard"><i class="ti ti-users"></i>menu</a>
            <a href="/trabajadores"><i class="ti ti-users"></i> Trabajadores</a>
            <a href="/asistencia"><i class="ti ti-calendar-check"></i> Asistencia</a>
            <a href="/reportes"><i class="ti ti-report"></i> Reporte</a>
            <a href="/produccion"><i class="ti ti-chart-bar"></i> Producción</a>
        </div>
        <div class="navbar-usuario">
            <i class="ti ti-user-circle"></i>
            <span>{{ usuario }}</span>
            <a href="/logout" class="btn-logout">
                <i class="ti ti-logout"></i> Salir
            </a>
        </div>
    </nav>

    <div class="dashboard-contenido">
        <h2 class="dashboard-titulo">Exportar Reporte</h2>
        <p class="dashboard-subtitulo">Selecciona el rango de fechas y el formato</p>

        <div class="formulario-card" style="max-width: 500px;">
            <h4><i class="ti ti-calendar"></i> Rango de Fechas</h4>
            <form method="GET" action="/exportar/pdf">
                <div class="fila-campos">
                    <div class="campo-form">
                        <label>FECHA INICIO</label>
                        <input type="date" name="fecha_inicio" required>
                    </div>
                    <div class="campo-form">
                        <label>FECHA FIN</label>
                        <input type="date" name="fecha_fin" required>
                    </div>
                </div>
                <div style="display:flex; gap:12px; margin-top:8px;">
                    <button type="submit" class="btn-registrar" style="background:#C0392B;">
                        <i class="ti ti-file-type-pdf"></i> Descargar PDF
                    </button>
                    <button type="submit" formaction="/exportar/excel" class="btn-registrar" style="background:#1e8449;">
                        <i class="ti ti-file-spreadsheet"></i> Descargar Excel
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
