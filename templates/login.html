<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liar Fire System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="body-login">

    <div class="login-full">

        <!-- Lado izquierdo -->
        <div class="lado-izquierdo">
            <div class="logo-wrap">
                <img src="/static/img/logo.png" alt="Logo Liar Fire System">
            </div>
            <p class="emp-sub">LIAR FIRE SYSTEM</p>
            <p class="bienvenida">Sistema de control de asistencia</p>
        </div>

        <!-- Lado derecho -->
        <div class="lado-derecho">
            <div class="avatar-circle">
                <i class="ti ti-user"></i>
            </div>
            <h2 class="form-titulo">Iniciar sesión</h2>
            <p class="form-subtitulo">Ingresa tus credenciales para continuar</p>

            <div class="form-inner">
                <form method="POST" action="/login">

                    {% if error %}
                    <div class="mensaje-error">
                        <i class="ti ti-alert-circle"></i> {{ error }}
                    </div>
                    {% endif %}

                    <label class="campo-label">USUARIO</label>
                    <div class="input-wrapper">
                        <i class="ti ti-user"></i>
                        <input class="campo-input" type="text" name="usuario" placeholder="Ingresa tu usuario">
                    </div>

                    <label class="campo-label">CONTRASEÑA</label>
                    <div class="input-wrapper">
                        <i class="ti ti-lock"></i>
                        <input class="campo-input" type="password" name="contrasena" placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn-ingresar">INGRESAR</button>

                </form>
            </div>
        </div>

    </div>

</body>
</html>
